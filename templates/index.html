<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dish Diary</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>

  <header class="site-header">
    <div class="brand">
      <h1>Dish <em>Diary.</em></h1>
      <p class="tagline">a personal food photo blog</p>
    </div>
    <a href="/upload" class="btn">Post a dish →</a>
  </header>

  <main class="blog-main">
    {% if posts %}
      <div class="grid">
        {% for post in posts %}
          <div class="card">
            <img src="/{{ post.filename }}" alt="food photo" />
            <div class="card-body">
              <p class="caption">{{ post.caption }}</p>
              <p class="date">{{ post.date }}</p>
            </div>
          </div>
        {% endfor %}
      </div>
    {% else %}
      <div class="empty">
        <p>Your diary is empty. Go eat something worth remembering.</p>
        <a href="/upload">Add your first dish →</a>
      </div>
    {% endif %}
  </main>

</body>
</html>
